name: deepfishy

services:
  # PostgreSQL - Primary database for chat conversations and metadata
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "2345:5432"
    environment:
      - POSTGRES_DB=deepfishy
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d deepfishy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepfishy
    restart: unless-stopped

  # Redis - message broker and result backend
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - deepfishy

  # Celery Worker - executes tasks
  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: celery_worker
    command: celery -A src.app.celery_app worker --loglevel=info --concurrency=2 -Q crawler,ingestion,celery
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - ../src:/app/src
      - ../data:/app/data
    networks:
      - deepfishy

  # Celery Beat - scheduler that triggers periodic tasks
  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: celery_beat
    command: celery -A src.app.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - ../src:/app/src
    networks:
      - deepfishy

  # FastAPI - main application
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: server
    command: python -m uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - ../src:/app/src
      - ../data:/app/data
    networks:
      - deepfishy

  # MinIO - S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepfishy

  # Etcd - required by Milvus for metadata storage
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: 
        ["CMD", "etcdctl", "--endpoints=localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepfishy

  # Milvus - Vector Database
  milvus:
    image: milvusdb/milvus:latest
    container_name: milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      - COMMON_STORAGETYPE=local
      - ETCD_ENDPOINTS=etcd:2379
      - ETCD_USE_EMBED=false
    command: milvus run standalone
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - deepfishy

  # Milvus Web UI (Attu)
  milvus_webui:
    image: zilliz/attu:latest
    container_name: milvus_webui
    ports:
      - "8001:3000"
    environment:
      - MILVUS_URL=milvus:19530
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - deepfishy

  # LangGraph Studio
  langgraph_studio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: langgraph_studio
    working_dir: /app/src/app/engine
    command: langgraph dev --host 0.0.0.0 --port 2024 --allow-blocking --no-browser
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    env_file:
      - .env
    ports:
      - "2024:2024"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - ../src:/app/src
      - ../data:/app/data
    networks:
      - deepfishy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  milvus_data:
  etcd_data:

networks:
  deepfishy:
    driver: bridge
