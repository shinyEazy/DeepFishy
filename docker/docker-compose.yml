name: deepfishy

services:
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "1212:5432"
    environment:
      - POSTGRES_DB=deepfishy
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d deepfishy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepfishy

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "1213:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - deepfishy

