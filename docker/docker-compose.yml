  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: server
    command: python -m uvicorn deepfishy.app.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/gcp-service-account.json
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-us-central1}
      - RESPONSE_MODEL=${RESPONSE_MODEL:-gemini-3.1-flash-lite-preview}
    env_file:
      - .env
    ports:
      - "1214:8000"
    volumes:
      - ../deepfishy:/app/deepfishy
      - ../scripts:/app/scripts
      - ../db:/app/db
      - ../engine:/app/engine
      - ../ingestion:/app/ingestion
      - ../configs:/app/configs
      - ../graph_rag:/app/graph_rag
      - ../embedding:/app/embedding
      - ../outputs:/app/outputs
      - ../benchmark:/app/benchmark
      - ../templates:/app/templates
      - ../logs:/app/logs
      - ${GOOGLE_APPLICATION_CREDENTIALS_FILE}:/run/secrets/gcp-service-account.json:ro
    networks:
      - deepfishy

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    ports:
      - "1215:9000"
      - "1216:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepfishy

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    ports:
      - "1217:2379"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test:
        ["CMD", "etcdctl", "--endpoints=localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepfishy

  milvus:
    image: milvusdb/milvus:2.6-20260319-27c9122b
    container_name: milvus
    ports:
      - "1218:19530"
      - "1219:9091"
    environment:
      - COMMON_STORAGETYPE=local
      - ETCD_ENDPOINTS=etcd:2379
      - ETCD_USE_EMBED=false
    command: milvus run standalone
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - deepfishy

  milvus_webui:
    image: zilliz/attu:v2.6
    container_name: milvus_webui
    ports:
      - "1220:3000"
    environment:
      - MILVUS_URL=milvus:19530
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - deepfishy

  neo4j:
    image: neo4j:2026.02
    container_name: neo4j
    ports:
      - "1221:7474" # HTTP Browser
      - "1222:7687" # Bolt Protocol
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      # Memory settings
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - deepfishy

