name: deepfishy

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "2345:5432"
    environment:
      - POSTGRES_DB=deepfishy
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d deepfishy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepfishy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - deepfishy

  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: celery_worker
    command: celery -A celery_app worker --loglevel=info --concurrency=2 -Q crawler,ingestion,celery
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - ../api:/app/api
      - ../core:/app/core
      - ../db:/app/db
      - ../engine:/app/engine
      - ../ingestion:/app/ingestion
      - ../services:/app/services
      - ../utils:/app/utils
      - ../worker:/app/worker
      - ../configs:/app/configs
      - ../main.py:/app/main.py
      - ../celery_app.py:/app/celery_app.py
      - ../data:/app/data
      - ../outputs:/app/outputs
    networks:
      - deepfishy

  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: celery_beat
    command: celery -A celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - ../api:/app/api
      - ../core:/app/core
      - ../db:/app/db
      - ../engine:/app/engine
      - ../ingestion:/app/ingestion
      - ../services:/app/services
      - ../utils:/app/utils
      - ../worker:/app/worker
      - ../configs:/app/configs
      - ../main.py:/app/main.py
      - ../celery_app.py:/app/celery_app.py
    networks:
      - deepfishy

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: server
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - ../api:/app/api
      - ../core:/app/core
      - ../db:/app/db
      - ../engine:/app/engine
      - ../ingestion:/app/ingestion
      - ../services:/app/services
      - ../utils:/app/utils
      - ../worker:/app/worker
      - ../configs:/app/configs
      - ../main.py:/app/main.py
      - ../celery_app.py:/app/celery_app.py
      - ../data:/app/data
      - ../graph_rag:/app/graph_rag
      - ../embedding:/app/embedding
      - ../outputs:/app/outputs
    networks:
      - deepfishy

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepfishy

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test:
        ["CMD", "etcdctl", "--endpoints=localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepfishy

  milvus:
    image: milvusdb/milvus:latest
    container_name: milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      - COMMON_STORAGETYPE=local
      - ETCD_ENDPOINTS=etcd:2379
      - ETCD_USE_EMBED=false
    command: milvus run standalone
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - deepfishy

  milvus_webui:
    image: zilliz/attu:latest
    container_name: milvus_webui
    ports:
      - "8001:3000"
    environment:
      - MILVUS_URL=milvus:19530
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - deepfishy

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt Protocol
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      # Memory settings
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - deepfishy
    restart: unless-stopped

